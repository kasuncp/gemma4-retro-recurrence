              - button "Link" [ref=e135] [cursor=pointer]:
                - img [ref=e136]
            - paragraph [ref=e139]: A private mobile AI assistant that runs entirely on your device and can understand your schedule, write emails, condense long texts, take photos, and diagnose car problems requires more advanced cognitive capabilities than current small AI models offer.
            - paragraph [ref=e140]: The phone’s unchangeable 6-12GB of usable memory and 8W power constraints prevent simply scaling up the model for achieving that capability. The challenge, then, is to determine, within a device’s fixed memory, power, and latency constraints, which test-time computational strategy offers the greatest reasoning accuracy per unit energy.
            - paragraph [ref=e141]: In the first part of this new blog post series, we explore how inference-time compute scales on Small Language Models, focusing on Gemma 4 E2B (more details on model selection below). We’re curious if longer generations can truly enhance reasoning accuracy without increasing the weights' load. In the upcoming posts, we’ll also take a closer look at self-consistency, richer prompting, and their influence on reasoning ability.
            - heading "The approach Link" [level=2] [ref=e142]:
              - text: The approach
              - button "Link" [ref=e145] [cursor=pointer]:
                - img [ref=e146]
            - paragraph [ref=e149]: In this series, we consider the following four candidate mechanisms.
            - list [ref=e150]:
              - listitem [ref=e151]:
                - paragraph [ref=e152]:
                  - strong [ref=e153]: Path 1 — Generate more tokens.
                  - text: Don’t touch the model at all; let it think for longer during inference. The path this site documents.
              - listitem [ref=e154]:
                - paragraph [ref=e155]:
                  - strong [ref=e156]:
                    - text: Path 2 —
                    - link "Retrofitted Recurrence" [ref=e157] [cursor=pointer]:
                      - /url: https://arxiv.org/abs/2511.07384
                    - text: .
                  - text: Force a chunk of decoder layers to run multiple times per forward pass, trading wall-clock for depth on the same weights.
              - listitem [ref=e158]:
                - paragraph [ref=e159]:
                  - strong [ref=e160]: Path 3 — A bigger sibling, aggressively quantized.
                  - text: Swap E2B for its E4B sibling at INT4, landing in roughly the same memory envelope with twice the parameters.
              - listitem [ref=e161]:
                - paragraph [ref=e162]:
                  - strong [ref=e163]:
                    - text: Path 4 —
                    - link "Mixture-of-Depths" [ref=e164] [cursor=pointer]:
                      - /url: https://arxiv.org/abs/2404.02258
                    - text: .
                  - text: Route hard tokens through full compute and bypass easy ones, allocating per-token rather than per-layer.
            - paragraph [ref=e165]: Accuracy comes at the cost of various taxes, such as latency, training expenses, quantization loss, and router complexity. The one that achieves the highest accuracy per token in a standard evaluation setup will win the competition.
            - 'figure "Figure 1: The four candidate paths we will be evaluating in this series" [ref=e167]':
              - 'link "Figure 1: The four candidate paths we will be evaluating in this series" [ref=e168]':
                - /url: https://substackcdn.com/image/fetch/$s_!aQdu!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fec9080e2-f3d7-4815-939c-a320097968b8_3014x1988.png
                - generic [ref=e169]:
                  - 'img "Figure 1: The four candidate paths we will be evaluating in this series" [ref=e171]'
                  - generic [ref=e173]:
                    - button [ref=e174] [cursor=pointer]:
                      - img [ref=e175]
                    - button [ref=e177] [cursor=pointer]:
                      - img [ref=e178]
              - generic [ref=e179]: "Figure 1: The four candidate paths we will be evaluating in this series"
            - paragraph [ref=e181]:
              - strong [ref=e182]: NOTE
              - text: ": This post covers only the very first experiment of"
              - strong [ref=e183]: Path 1
              - text: . The four-paths comparison is the program; Path 1 is the zero-engineering baseline that every other path has to beat. If inference-time compute on the off-the-shelf model doesn’t show meaningful results, that’s a strong result — it means the other paths don’t have a moving target to chase. We will explore the other paths in the next few posts of the series.
            - heading "Why Gemma 4 E2B Link" [level=2] [ref=e184]:
              - text: Why Gemma 4 E2B
              - button "Link" [ref=e187] [cursor=pointer]:
                - img [ref=e188]
            - paragraph [ref=e191]:
              - text: Any investigation depends on a baseline model, and the baseline matters. We picked
              - strong [ref=e192]: Gemma 4 E2B-it
              - text: for three reasons, in order of weight.
            - heading "It fits the phone-class budget by construction. Link" [level=3] [ref=e193]:
              - text: It fits the phone-class budget by construction.
              - button "Link" [ref=e196] [cursor=pointer]:
                - img [ref=e197]
            - paragraph [ref=e200]:
              - text: Gemma 4 E2B is engineered for on-device deployment. Google reports around 2.3 billion
              - emphasis [ref=e201]: effective
              - text: "parameters, and the model pulls off a neat trick to get there: the weights are partitioned between accelerator-resident layers (the transformer proper) and CPU-resident"
              - strong [ref=e202]: Per-Layer Embeddings
              - text: that stream into the accelerator on demand. The result is an on-device memory footprint of roughly 2GB — comfortably within a 6GB phone envelope, with headroom for a KV cache, a vision encoder, and anything the other paths need. A 7B-class model does not fit that budget under any realistic quantization, making it the wrong size for this investigation, full stop.
            - heading "It is natively multimodal — what a mobile assistant actually needs. Link" [level=3] [ref=e203]:
              - text: It is natively multimodal — what a mobile assistant actually needs.
              - button "Link" [ref=e206] [cursor=pointer]:
                - img [ref=e207]
            - paragraph [ref=e210]: A phone assistant that can hear and see its user offers far more value than one that can't. Gemma 4 E2B stands out by handling not just text, but also images, videos, and, uniquely among the small E2B and E4B models, audio. As we work to improve the model's reasoning abilities, it’s important that these multimodal features stay intact. Thankfully, E2B’s architecture makes it feasible to maintain these capabilities without turning them into a challenge to overcome.
            - heading "The license lets the work ship. Link" [level=3] [ref=e211]:
              - text: The license lets the work ship.
              - button "Link" [ref=e214] [cursor=pointer]:
                - img [ref=e215]
            - paragraph [ref=e218]: Gemma 4 is licensed under Apache 2.0, allowing us to fine-tune, retrofit, and publish derived weights and benchmark results without needing individual approvals from Google. None of the four options involves licensing issues, which alone excludes many other potential competitors.
            - blockquote [ref=e219]:
              - paragraph [ref=e220]:
                - text: If you’d like to understand the Gemma 4 class of models and their design decisions better, I highly recommend reading
                - strong [ref=e221]:
                  - link "A Visual Guide to Gemma 4" [ref=e222] [cursor=pointer]:
                    - /url: https://open.substack.com/pub/maartengrootendorst/p/a-visual-guide-to-gemma-4?utm_campaign=post-expanded-share&utm_medium=web
                - text: by
                - link "Maarten Grootendorst" [ref=e224] [cursor=pointer]:
                  - /url: https://open.substack.com/users/14309499-maarten-grootendorst?utm_source=mentions
                - text: .
            - separator [ref=e226]
            - heading "What Path 1 is about Link" [level=2] [ref=e227]:
              - text: What Path 1 is about
              - button "Link" [ref=e230] [cursor=pointer]:
                - img [ref=e231]
            - paragraph [ref=e234]:
              - text: "Path 1 asks a single question:"
              - strong [ref=e235]: can Gemma 4 E2B trade inference-time compute for reasoning accuracy, with no weight changes at all — just longer/richer prompting?
            - paragraph [ref=e236]: The three mechanisms in that bucket are
            - list [ref=e237]:
              - listitem [ref=e238]:
                - paragraph [ref=e239]: Longer chain-of-thought generation
              - listitem [ref=e240]:
                - paragraph [ref=e241]: Self-consistency sampling
              - listitem [ref=e242]:
                - paragraph [ref=e243]: Deliberation/reflection prompts
            - paragraph [ref=e244]: "But before sweeping any of them, we need an experiment to answer one simpler, but extremely important question:"
            - blockquote [ref=e245]:
              - paragraph [ref=e246]:
                - strong [ref=e247]: Does giving Gemma 4 E2B reasoning steps in-context beat giving it none, on GSM8K, at a matched prompting protocol?
            - paragraph [ref=e248]: Based on common sense and existing literature, the answer might be yes, but we'll investigate this further. We need not only a yes-or-no answer but also a measure of how much improvement is achieved—especially for our chosen model, Gemma 4 E2B, if any. If the answer turns out to be no (something we'll need to analyze), then Path 1 faces limitations on E2B during inference, and all its sub-mechanisms, like longer CoT, self-consistency, and deliberation, will be affected by that weakness. So, let’s set up an affordable experiment first to explore this important question.
            - 'heading "Experiment 1: The CoT gate on GSM8K Link" [level=3] [ref=e249]':
              - text: "Experiment 1: The CoT gate on GSM8K"
              - button "Link" [ref=e252] [cursor=pointer]:
                - img [ref=e253]
            - heading "What we are testing Link" [level=4] [ref=e256]:
              - text: What we are testing
              - button "Link" [ref=e259] [cursor=pointer]:
                - img [ref=e260]
            - paragraph [ref=e263]: "The experiment is small and deliberate. We load Gemma 4 E2B-it — the instruction-tuned variant of Gemma 4 E2B — as the main subject, with the raw base model along for a sanity check. We run both against GSM8K, the grade-school math benchmark, using the first 100 problems of the test split. That slice is deterministic: nothing random, nothing cherry-picked, same 100 problems every time."
            - paragraph [ref=e264]: Each model experiences two prompting scenarios, both using the same set of 8 standard GSM8K examples. In the “direct” scenario, we simplify the examples by removing the reasoning steps, leaving only the final answer, so the model is prompted to generate just a number. In the “chain-of-thought” scenario, the examples retain their reasoning steps, demonstrating the step-by-step process we want to evaluate. The only difference is whether the examples include reasoning. The model, questions, and other factors stay consistent throughout.
            - paragraph [ref=e265]:
              - text: Decoding is straightforward — it doesn't involve sampling, temperature adjustments, or surprises. The direct condition provides a 16-token output limit (suitable for a number), while the chain-of-thought condition allows up to 512 tokens (perfect for reasoning). We extract the integer answer from the model's output, compare it to the correct answer using exact-match scoring, calculate
              - link "95% Wilson confidence intervals" [ref=e266] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Binomial_proportion_confidence_interval
              - text: ", display a simple results table, save the raw data in JSON format, and follow our pre-planned decision rules."
            - heading "What we’re not testing (deliberately) Link" [level=4] [ref=e267]:
              - text: What we’re not testing (deliberately)
              - button "Link" [ref=e270] [cursor=pointer]:
                - img [ref=e271]
            - paragraph [ref=e274]: "The scope is narrow because widening it would muddy the result. A few tempting additions are explicitly off the table:"
            - list [ref=e275]:
              - listitem [ref=e276]:
                - paragraph [ref=e277]:
                  - strong [ref=e278]: No self-consistent voting, no varying the output length.
                  - text: These conditions are for the next experiments to test. If we throw them in here, we won’t be able to tell which lever actually mattered.
              - listitem [ref=e279]:
                - paragraph [ref=e280]:
                  - strong [ref=e281]: No other benchmarks (for now).
                  - text: GSM8K only. ARC-Easy, MATH, and BBH have not been considered yet; including them now would turn a clear question into multiple ambiguous ones.
              - listitem [ref=e282]:
                - paragraph [ref=e283]:
                  - strong [ref=e284]: No clever prompting tricks.
                  - text: No “let’s verify your answer,” no reflection loops, no deliberation prompts. Just the canonical 8 exemplars, verbatim, in two variants.
              - listitem [ref=e285]:
                - paragraph [ref=e286]:
                  - strong [ref=e287]: No zero-shot “let’s think step by step” either.
                  - text: Keeping both conditions 8-shot is the whole point — it’s what isolates
                  - emphasis [ref=e288]: “does having reasoning in-context help?”
                  - text: from
                  - emphasis [ref=e289]: “does the model follow zero-shot instructions?”
                  - text: Different question, different experiment.
              - listitem [ref=e290]:
                - paragraph [ref=e291]:
                  - strong [ref=e292]: No training, no fine-tuning, no adapter surgery, no on-device measurement.
                  - text: This experiment does not touch the weights at all.
            - 'figure "Table 1: Four cells, all at n = 100 on the deterministic first slice of the GSM8K test; the only variable is whether the exemplars'' reasoning is present (CoT) or stripped (direct), and whether the model is instruction-tuned or base." [ref=e294]':
              - link [ref=e295]:
                - /url: https://substackcdn.com/image/fetch/$s_!a4-L!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F39d62a1d-c87d-4791-87ef-435507eafc80_1406x552.png
