            - heading "What does this mean? Link" [level=2] [ref=e417]:
              - text: What does this mean?
              - button "Link" [ref=e420] [cursor=pointer]:
                - img [ref=e421]
            - paragraph [ref=e424]: Three things.
            - list [ref=e425]:
              - listitem [ref=e426]:
                - paragraph [ref=e427]:
                  - strong [ref=e428]: The +30-point gap really is significant, and there's no need for a larger sample to be confident about it.
                  - text: A McNemar p-value of 1.9 × 10⁻⁹ is incredibly strong evidence that won’t be changed just by adding more data. The decision is clear. Chain-of-thought truly makes a difference on Gemma 4 E2B, especially for at least 30 out of 100 problems that can only be solved when the model has the chance to reason in context.
              - listitem [ref=e429]:
                - paragraph [ref=e430]:
                  - strong [ref=e431]: Path 1 begins on a solid note.
                  - text: The instruction-tuned version with 8-shot CoT achieves a 31% success rate on GSM8K. This sets a benchmark that all other paths in the four-path exploration need to surpass when running on the same device. If a depth-recurrent version, a quantized larger model, or a Mixture-of-Depths router can’t reach this 31% mark, it probably isn’t as strong in this comparison, as it’s a clear standard to beat.
              - listitem [ref=e432]:
                - paragraph [ref=e433]:
                  - strong [ref=e434]: The 1% direct-cell number is simply a result of the way the prompt is set up, not a sign of flawed reasoning.
                  - text: When using 16 generation tokens with 8-shot priming, the instruction-tuned model tends to pattern-match the examples and repeat the
                  - emphasis [ref=e435]: next
                  - text: question instead of providing an answer. If the direct cell were better framed, it might score above 1%, but it would still be lower than the CoT cell, because no direct prompt can match the multi-step reasoning required for the 30 problems that are correct with Chain-of-Thought (CoT). The key finding about the gate remains unchanged despite this artifact.
            - heading "The way forward Link" [level=2] [ref=e436]:
              - text: The way forward
              - button "Link" [ref=e439] [cursor=pointer]:
                - img [ref=e440]
            - paragraph [ref=e443]: The gate cleared — we have proven that chain-of-thought genuinely works on Gemma 4 E2B.
            - paragraph [ref=e444]:
              - strong [ref=e445]: Here's the first important question
              - text: ": If giving the model more space to reason in context increases its accuracy by 30 points, could providing even more room — like longer outputs or multiple tries at the same problem with a vote at the end — boost accuracy even further? This approach, where we trade off inference time for better results, is a common strategy and a clear next step to explore. Our upcoming experiment will test both factors: how long the model can generate, and how many independent attempts it gets per problem. If we see a noticeable improvement, then Path 1 has a lot of room to grow. If the results level off, then we've found the maximum potential — which is still a valuable and worth sharing insight."
            - paragraph [ref=e446]:
              - strong [ref=e447]: A second question, hidden in the data, is what failures look like.
              - text: Out of 69 problems Gemma 4 E2B-it got wrong, 13 weren’t true errors — the model fell into a repetition loop and produced no answer. The base model did this 3 times. This four-fold gap suggests some errors are due to
              - emphasis [ref=e448]: generation stability
              - text: ", not"
              - emphasis [ref=e449]: reasoning capacity
              - text: ". The difference is important: a reasoning ceiling means the model truly can’t solve the problems, while a stability ceiling indicates it might know but can’t output the answer cleanly. An analysis of existing data can estimate how much of the 30% ceiling is due to each."
            - paragraph [ref=e450]:
              - strong [ref=e451]: A third question is whether this generalizes
              - text: . All data is from GSM8K, a grade-school math benchmark. The chain-of-thought lift is significant on this benchmark, so it’s likely to appear on other reasoning tests, but this isn’t confirmed. Testing on another benchmark, ARC-Easy, which differs from GSM8K by lacking multi-step arithmetic, answer-format markers, and a risk of token exhaustion, can verify robustness. If results repeat, the finding is solid; if not, we learn which benchmarks benefit from chain-of-thought.
            - paragraph [ref=e452]:
              - strong [ref=e453]: Finally, the prompt itself deserves a check.
              - text: The 30% ceiling is what Gemma 4 E2B-it achieves with the 8-example chain-of-thought prompt. But that prompt is just one setup. Asking the model to “think step by step,” without examples, sometimes matches or beats the 8-example version on instruction-tuned models. We should test that. If the simpler prompt hits the same ceiling, the model has a true limit regardless of prompt, and the write-up is clearer. If it improves accuracy, the 30% figure was prompt-specific, and the baseline shifts.
            - paragraph [ref=e454]:
              - strong [ref=e455]: "All four follow-ups are designed in a similar way:"
              - text: each one looks into how the gate result might be misleading or incomplete, with a planned conclusion for every possible outcome. They help us test conditions we intentionally left out from this experiment. The good news is, there's no need for new model training, architecture changes, or extra infrastructure — it’s all about taking more careful measurements of the current model on the same hardware. Once we finish these four follow-ups, we'll have a clear understanding of Path 1, and we'll be ready to compare it directly with the other three paths.
            - heading "Parting comments Link" [level=2] [ref=e456]:
              - text: Parting comments
              - button "Link" [ref=e459] [cursor=pointer]:
                - img [ref=e460]
            - paragraph [ref=e463]: "Next is Plan 2: Does allowing the model to generate longer responses improve results? Does sampling multiple attempts and then voting on the answers make a difference? Or does the performance curve level off? Stay tuned for the next post."
