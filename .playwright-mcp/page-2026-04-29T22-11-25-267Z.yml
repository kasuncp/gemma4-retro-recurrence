            - heading "A note on the statistics Link" [level=4] [ref=e306]:
              - text: A note on the statistics
              - button "Link" [ref=e309] [cursor=pointer]:
                - img [ref=e310]
            - paragraph [ref=e313]: Two choices about how the numbers were tested.
            - list [ref=e314]:
              - listitem [ref=e315]:
                - paragraph [ref=e316]:
                  - strong [ref=e317]:
                    - link "Wilson 95% confidence intervals" [ref=e318] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/Binomial_proportion_confidence_interval
                  - text: for every accuracy reported. A confidence interval shows the range of values where a sample statistic is likely to fall, offering a “give or take” around an estimate. While the usual way to calculate a percentage can run into problems at the very low or high ends—like when a cell scores just 1 out of 100, resulting in a range that includes negative numbers, which don't make sense for percentages—Wilson’s method stays reliable no matter what the score or sample size. Since one cell scored exactly 1%, this wasn’t just a matter of preference but a difference between an interval that makes sense and one that doesn’t.
              - listitem [ref=e319]:
                - paragraph [ref=e320]:
                  - strong [ref=e321]:
                    - link "McNemar’s two-sided exact test" [ref=e322] [cursor=pointer]:
                      - /url: https://en.wikipedia.org/wiki/McNemar%27s_test
                  - text: to compare the chain-of-thought condition to the direct condition. The two conditions were tested on the same set of 100 problems, with only the prompt changed — it's an important detail. To truly find out if 'chain-of-thought' genuinely helps, we should focus on the 30 problems where chain-of-thought got it right but direct didn’t, since there were no problems the other way around. McNemar’s test specifically looks at these disagreements, providing solid evidence for the claim. Ignoring the pairing would have missed this key information and led to a weaker, less trustworthy result.
            - paragraph [ref=e323]:
              - text: In summary,
              - strong [ref=e324]: Wilson's method is great for adding error bars to small samples, and McNemar's test is perfect for comparing two conditions tested on the same problems.
              - text: Throughout the project, we use both methods for the same reasons, ensuring accurate and reliable results.
            - generic [ref=e325]:
              - heading "Execution rig" [level=4] [ref=e326]
              - paragraph [ref=e327]: The experiment ran on a single RTX 3090 in bfloat16, taking about three hours across all four cells — 100 x 4 = 400 GSM8K inferences in total.
              - paragraph [ref=e328]: The software stack consisted of PyTorch 2.4.1 on CUDA 12.4, Transformers 5.6.1, and Datasets 4.8.4, with both model variants pinned to specific HuggingFace commits to ensure reproducibility. The 8-shot exemplar prompt was fingerprinted to a canonical hash, so any re-run can verify it’s using the same prompt byte-for-byte.
